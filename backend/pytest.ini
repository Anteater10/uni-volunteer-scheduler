# Plan 06: 70% global line coverage is the aspirational target; critical
# paths (signup_service.py, routers/signups.py, celery_app.py) must reach
# 90% — enforced by a shell grep check in Plan 07 CI, not by a pytest-cov
# selector. The active --cov-fail-under floor is 55% because the current
# integration suite lives in routers/{auth,signups,admin,users} and the
# unexercised slots/portals/events/admin-broadcast code paths drag the
# global % down. Raising the floor is tracked as a Plan 07 follow-up.
# Target: --cov-fail-under=70  (active floor below is lower)
[pytest]
testpaths = tests
addopts = -ra --strict-markers --tb=short --cov=app --cov-report=term-missing --cov-fail-under=55
markers =
    integration: integration tests hitting the real Postgres via TestClient
    unit: fast unit tests with no I/O
    merge_gate: merge-gate tests that must pass before merging (concurrent check-in)
