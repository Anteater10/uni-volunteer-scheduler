<h1 style="font-size:20px;color:#1a1a1a;margin:0 0 16px;">Schedule change</h1>
<p style="margin:0 0 12px;">Hi $user_name,</p>
<p style="margin:0 0 12px;">The time for your volunteer slot has changed:</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 16px;">
  <tr><td style="padding:4px 8px 4px 0;font-weight:bold;">Event:</td><td style="padding:4px 0;">$event_title</td></tr>
  <tr><td style="padding:4px 8px 4px 0;font-weight:bold;">New time:</td><td style="padding:4px 0;">$slot_when</td></tr>
  <tr><td style="padding:4px 8px 4px 0;font-weight:bold;">Where:</td><td style="padding:4px 0;">$event_location</td></tr>
</table>
<p style="margin:0;">If you can no longer attend, please cancel your signup.</p>
